spring:
  application:
    name: mini-doodle

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/minidoodle}
    username: ${SPRING_DATASOURCE_USERNAME:minidoodle}
    password: ${SPRING_DATASOURCE_PASSWORD:minidoodle}
    hikari:
      # Request handling is DB-bound, so the Tomcat thread cap (below) is kept
      # close to the pool size: excess threads would only queue on the pool.
      # 5s connection-timeout fails fast under saturation instead of letting
      # callers hang for Hikari's 30s default.
      maximum-pool-size: 20
      connection-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true

  mvc:
    format:
      date-time: iso

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  tomcat:
    threads:
      max: 50
